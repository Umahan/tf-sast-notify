stages:
  - lint
  - validate
  - plan
  - apply
  
image:
  name: hashicorp/terraform:1.8
  entrypoint:
    - '/usr/bin/env'
    - 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'

variables:
  YC_SERVICE_ACCOUNT_KEY_FILE: /tmp/sa-key.json
  PLAN_JSON: plan.json

before_script:
  # Creating an Access Key File for Terraform
  - echo ${YC_KEY} > /tmp/sa-key.json
  # Setting up a mirror for downloading providers, as direct access is limited by HashiCorp
  - |
    cat <<EOF >> ~/.terraformrc
    provider_installation {
      network_mirror {
        url = "https://terraform-mirror.yandexcloud.net/"
        include = ["registry.terraform.io/*/*"]
      }
      direct {
        exclude = ["registry.terraform.io/*/*"]
      }
    }
    EOF
  # Installing the jq utility
  - apk --no-cache add jq
  # Creating an alias to convert a JSON report
  - alias convert_report="jq -r '([.resource_changes[]?.change.actions?]|flatten)|{\"create\":(map(select(.==\"create\"))|length),\"update\":(map(select(.==\"update\"))|length),\"delete\":(map(select(.==\"delete\"))|length)}'"
  - terraform --version
  - terraform init

lint:checkov:
  stage: lint
  image:
    name: bridgecrew/checkov
    entrypoint:
      - '/usr/bin/env'
      - 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'
  before_script: []
  script:
    - checkov -d .

lint:tflint:
  stage: lint
  image:
    name: ghcr.io/terraform-linters/tflint
    entrypoint:
      - '/usr/bin/env'
      - 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'
  before_script: []
  script:
    - tflint 


validate:
  stage: validate
  script:
    - terraform validate


plan:
  stage: plan
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == 'main'
  script:
    - terraform plan -out "planfile"
    - terraform show --json planfile | convert_report > $PLAN_JSON
  dependencies:
    - validate
  artifacts:
    paths:
      - planfile
    reports:
      terraform: $PLAN_JSON
 
apply:
  stage: apply
  script:
    - terraform apply -input=false "planfile"
  dependencies:
    - plan
  when: manual


destroy:
  stage: destroy
  script:
    - terraform destroy --auto-approve
  when: manual 

after_script:
  - which curl &> /dev/null || apk add curl || (apt update; apt -y install curl)
  - >
    curl -X POST -H "Content-Type: application/json" -d "{\"parse_mode\": \"markdown\",\"disable_web_page_preview\": \"True\",\"chat_id\": \"${CHAT_ID}\",\"text\": \"Pipeline: [${CI_PIPELINE_NAME}/${CI_PIPELINE_ID}](${CI_PIPELINE_URL}), Job: [${CI_JOB_NAME}](${CI_JOB_URL}) => *${CI_JOB_STATUS}*\"}" https://api.telegram.org/bot${TOKEN}/sendMessage

